<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style>
        body{
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
        }
        .grid-container{
            display: grid;
            gap: 25px;
           
        }
        .product-card{
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #fff;
            border: 1px solid #ddd;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .product-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body>
    <a href="https://amazon.com" target="_blank">Visit Amazon in new tab</a>
    <a href="https://flipkart.com" target="_self">Visit flipkart in same tab</a>
    <a href="https://mesho.com" target="_parent">Mesho</a>
</body>
</html>
