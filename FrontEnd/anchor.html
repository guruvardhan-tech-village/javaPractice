<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
        }
        .grid-container{
            display: grid;
            gap: 20px;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <a href="https://amazon.com" target="_blank">Visit Amazon in new tab</a><br>
    <a href="https://flipkart.com" target="_self">Visit flipkart in same tab</a><br>
    <a href="https://mesho.com" target="_parent">Mesho</a>
</body>
</html>
