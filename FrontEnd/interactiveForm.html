<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropertyForm</title>
    <style>
        body{
            font-family: sans-serif;
            max-width: 900px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
            background: #f4f7f6;
        }
        .form-side{
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .monitor-side{
            flex: 1;
            background: #2d3436;
            color: #00cec6;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            height: 500px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .row{
            margin-bottom: 15px;
        }
        label{
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input{
            width: 95%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input:invalid{
            border: 2px solid #e74c3c;
        }
        .attr-item{
            border-bottom: 1px solid #ddd;
            padding: 5px 0;
        }
        .highlight{
            color: #fab1a0;
            font-weight: bold;
        }
        input[type="submit"]:hover{
            background-color: #00cec6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="form-side">
        <h2>Property Form</h2>
        <form id="demoForm">
            <div class="row">
                <label for="propertyName"> Name (required,maxlength)</label>
                <input type="text" id="userName" name="userName" placeholder="Type here.." required maxlength="15">
            </div>
            <div class="row">
                <label >Range (min,max,step)</label>
                <input type="range" id="range" name="volume" min="0" max="100" step="10" value="30">
            </div>
            <div class="row">
                <label>Zip Code (Pattern)</label>
                <input type="text" id="zip" name="zip" pattern="[0-9]{5}" placeholder="12345" required>
            </div>
            <div class="row">
                <label>File (Accept, multiple)</label>
                <input type="file" id="files" name="upload" accept=".jpg,.png,.pdf" multiple>
            </div>
            <div class="row">
                <label><input type="checkbox" id="terms" name="terms" checked style="width: auto;" required> I agree to the terms and conditions</label>            
            </div>
            <input type="submit" value="Submit Property">
        </form>
    </div>
    <script>
        const allInputs = document.querySelectorAll('input');
        const logbox = document.getElementById('log');

        // Show attributes when user interacts
        allInputs.forEach(input => {
            input.addEventListener('focus', syncAttributes);
            input.addEventListener('input', syncAttributes);
            input.addEventListener('change', syncAttributes);
        });

        function syncAttributes(event) {
            const el = event.target;
            const attributes = el.attributes;

            let displayHtml = `
                <strong>Target Element:</strong><br>
                <span class="highlight">${el.name || 'Unnamed'}</span><br><br>
                <strong>Attributes:</strong><br>
            `;

            // Loop through attributes
            for(let i=0; i < attributes.length; i++) {
                const attr = attributes[i];
                displayHtml += `
                    <div class="attr-item">${attr.name}</div>
                        <strong>${attr.name}:</strong> ${attr.value}
                    </div>
                `;
            }

            // Show current value also
            displayHtml += `
                <br><strong>Current Value:</strong><br>
                <span class="highlight">${el.value}</span>
            `;

            logbox.innerHTML = displayHtml;
        }

        // Handle form submit
        document.getElementById('demoForm').addEventListener('submit', function(e) {
            e.preventDefault();

            logbox.innerHTML = `
                <h3 style="color:#55efc4;">✅ Form Submitted Successfully!</h3>
            `;
        });
    </script>
    <div class="monitor-side" id="log">
        <h3>Interact with the form to see attributes here...</h3>
    </div>
</body>
</html>
