<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropertyForm</title>
    <style>
        body{
            font-family: sans-serif;
            max-width: 900px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
            background: #f4f7f6;
        }
        .form-side{
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .monitor-side{
            flex: 1;
            background: #2d3436;
            color: #00cec6;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            height: 500px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .row{
            margin-bottom: 15px;
        }
        label{
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input{
            width: 95%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input:invalid{
            border: 2px solid #e74c3c;
        }
        .attr-item{
            border-bottom: 1px solid #ddd;
            padding: 5px 0;
        }
    </style>
</head>
<body>
    
</body>
</html>
