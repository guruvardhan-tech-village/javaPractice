<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="table2.css">
</head>

                    <th>Status</th>

            <tbody>
                <tr>
                    <td>Alice</td>
                    <td>30</td>
                    <td>New York</td>
                    <td>Bought</td>
                    <td>Pen</td>

                    <td>Bob</td>
                    <td>25</td>
                    <td>Los Angeles</td>
                    <td>Not Bought</td>
                    <td>Pencil</td>

                <tr>
                    <td>Charlie</td>
                    <td>35</td>
                    <td>Chicago</td>
                    <td>Not Bought</td>
                    <td>Eraser</td>

                </tr>
                <tr>
                    <td>Diana</td>
                    <td>28</td>
                    <td>Houston</td>

                    <td>Notebook</td>

        </table>

</html>
